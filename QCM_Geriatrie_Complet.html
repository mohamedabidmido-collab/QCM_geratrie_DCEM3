<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM Gériatrie — Mode Major ECN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent: #4f8ef7;
    --accent2: #7dd4c0;
    --gold: #f0c060;
    --red: #f06060;
    --green: #60c090;
    --text: #e8eaf0;
    --muted: #6b7490;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0f1420 0%, #141c32 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--gold);
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--accent); }

  .global-stats {
    display: flex;
    gap: 28px;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .global-stats strong { color: var(--text); font-size: 1.1rem; }

  /* ── LAYOUT ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 40px 28px; }

  /* ── COURSE NAV ── */
  .course-nav {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 48px;
  }

  .course-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all .2s;
    text-align: left;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    position: relative;
    overflow: hidden;
  }

  .course-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity .2s;
  }

  .course-btn:hover, .course-btn.active {
    background: var(--surface2);
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .course-btn:hover::before, .course-btn.active::before { opacity: 1; }

  .course-btn .num {
    display: block;
    font-size: 0.68rem;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .course-btn .title { font-weight: 500; line-height: 1.3; }

  .course-btn .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }

  .course-btn .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .4s;
  }

  .course-btn .score-badge {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── QCM SECTION ── */
  .qcm-section { display: none; }
  .qcm-section.active { display: block; }

  .section-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 36px;
    gap: 20px;
    flex-wrap: wrap;
  }

  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--text);
    letter-spacing: -0.03em;
  }

  .section-subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 4px;
  }

  .section-score {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 22px;
    text-align: center;
    min-width: 140px;
  }

  .section-score .score-val {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    color: var(--gold);
  }

  .section-score .score-label { font-size: 0.75rem; color: var(--muted); }

  /* ── QUESTION CARD ── */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    transition: border-color .2s;
  }

  .question-card.answered { border-color: var(--border); }
  .question-card.answered.correct { border-color: rgba(96,192,144,.35); background: rgba(96,192,144,.04); }
  .question-card.answered.incorrect { border-color: rgba(240,96,96,.35); background: rgba(240,96,96,.04); }

  .q-number {
    font-size: 0.72rem;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .q-text {
    font-size: 1.02rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 20px;
    line-height: 1.55;
  }

  .q-text strong { color: var(--gold); }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 18px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all .18s;
    font-size: 0.92rem;
    line-height: 1.45;
  }

  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(79,142,247,.07);
  }

  .option-key {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    transition: all .18s;
  }

  .option:hover:not(.disabled) .option-key {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* States */
  .option.correct {
    border-color: var(--green);
    background: rgba(96,192,144,.1);
  }
  .option.correct .option-key {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }

  .option.incorrect {
    border-color: var(--red);
    background: rgba(240,96,96,.1);
  }
  .option.incorrect .option-key {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  .option.disabled { cursor: default; pointer-events: none; }
  .option.disabled:not(.correct):not(.incorrect) { opacity: .55; }

  /* Correction block */
  .correction {
    display: none;
    margin-top: 18px;
    padding: 18px 20px;
    background: var(--surface2);
    border-left: 3px solid var(--accent2);
    border-radius: 0 10px 10px 0;
    font-size: 0.88rem;
    color: #c8d4f0;
    line-height: 1.65;
  }

  .correction.show { display: block; animation: fadeIn .3s ease; }

  @keyframes fadeIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: none; } }

  .correction strong { color: var(--gold); }
  .correction .correct-label {
    color: var(--green);
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }
  .correction .incorrect-label {
    color: var(--red);
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  .piege-tag {
    display: inline-block;
    background: rgba(240,192,96,.15);
    color: var(--gold);
    border: 1px solid rgba(240,192,96,.3);
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 1px 7px;
    letter-spacing: .06em;
    vertical-align: middle;
    margin-left: 6px;
  }

  /* ── RESULT BANNER ── */
  .result-banner {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-bottom: 36px;
    display: none;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
  }

  .result-banner.show { display: flex; }

  .result-text { font-family: 'DM Serif Display', serif; font-size: 1.4rem; }
  .result-detail { font-size: 0.88rem; color: var(--muted); margin-top: 4px; }

  .result-actions { display: flex; gap: 12px; flex-wrap: wrap; }

  .btn {
    padding: 11px 22px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #6a9ef9; transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text);
  }
  .btn-ghost:hover { border-color: var(--accent); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── BACK BTN ── */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: 1.5px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    margin-bottom: 28px;
    transition: all .2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--text); }

  /* ── HOME VIEW ── */
  #homeView { }
  .home-hero {
    text-align: center;
    padding: 48px 0 56px;
  }
  .home-hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.4rem);
    letter-spacing: -0.04em;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 12px;
  }
  .home-hero h1 em { font-style: italic; color: var(--gold); }
  .home-hero p { color: var(--muted); font-size: 1rem; }

  .home-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 12px;
  }

  @media (max-width: 720px) {
    .home-grid { grid-template-columns: 1fr; }
    header { padding: 18px 20px; }
    .container { padding: 24px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">QCM <span>Gériatrie</span></div>
  <div class="global-stats">
    <div>Cours <strong id="totalCoursesAnswered">0</strong>/14</div>
    <div>Score global <strong id="globalScore">—</strong></div>
  </div>
</header>

<div class="container">

<!-- HOME -->
<div id="homeView">
  <div class="home-hero">
    <h1>Révision <em>Gériatrie</em><br>ECN — Mode Major</h1>
    <p>14 cours · 210+ QCM avec correction didactique · Prêt pour l'examen</p>
  </div>
  <div class="course-nav" id="courseNav"></div>
</div>

<!-- QCM VIEW -->
<div id="qcmView" style="display:none">
  <button class="back-btn" onclick="goHome()">← Tous les cours</button>
  <div id="qcmContent"></div>
</div>

</div>

<script>
// ─────────────────────────────────────────────────────────────
// DATA — 14 cours × ≥15 QCM
// ─────────────────────────────────────────────────────────────
const COURSES = [

// ═══════════════════════════════════════════════════════════════
{ id: 1,
  title: "Généralités sur le Vieillissement",
  subtitle: "Théories, épidémiologie, effets par appareil",
  questions: [
  {
    q: "Selon l'OMS, à partir de quel âge est-on défini comme 'sujet âgé' ?",
    opts: ["60 ans","65 ans","70 ans","75 ans"],
    a: 1,
    corr: "<strong>≥ 65 ans</strong> selon l'OMS. Le 3ème âge s'étend de 65 à 85 ans (4ème âge). En Tunisie, l'âge social (retraite) est 55–60 ans, et l'âge pour le calcul des taux de services est 75 ans."
  },
  {
    q: "La théorie du vieillissement basée sur les <strong>radicaux libres</strong> explique :",
    opts: ["Un vieillissement programmé dans l'ADN","L'accumulation de protéines anormales par erreurs de transcription","L'oxydation des structures cellulaires par des molécules réactives","Des modifications du système immunitaire favorisant les maladies chroniques"],
    a: 2,
    corr: "La théorie des <strong>radicaux libres/stress oxydatif</strong> : des molécules réactives oxydent les structures proches → polymères inactifs → altération ADN et membranes. Conséquence : déséquilibre production de radicaux / protection."
  },
  {
    q: "La Progéria est l'illustration clinique de quelle théorie du vieillissement ?",
    opts: ["Théorie immunologique","Théorie neuroendocrine","Théorie génétique","Théorie des erreurs catastrophiques"],
    a: 2,
    corr: "<strong>Théorie génétique</strong> : le vieillissement est programmé dans l'ADN cellulaire. La Progéria illustre ce mécanisme avec des mutations géniques entraînant un vieillissement accéléré → décès avant 15 ans."
  },
  {
    q: "Concernant la mémoire chez le sujet âgé, quel type est atteint en <u>premier</u> physiologiquement ?",
    opts: ["Mémoire sémantique","Mémoire procédurale","Mémoire épisodique et de travail","Mémoire implicite"],
    a: 2,
    corr: "Le vieillissement neurologique normal affecte d'abord l'<strong>attention et la mémoire épisodique/de travail</strong>. La mémoire sémantique et procédurale sont plus rarement atteintes. Le rappel d'informations nouvelles est surtout perturbé."
  },
  {
    q: "Quelle est la conséquence principale de la <strong>↓ de la sensibilité des osmorécepteurs hypothalamiques</strong> chez le SA ?",
    opts: ["Polyurie","Émoussement de la sensation de soif → déshydratation","Hyponatrémie de dilution","Hyperosmolarité aiguë sans signes cliniques"],
    a: 1,
    corr: "<strong>Émoussement de la sensation de soif</strong> → risque majeur de déshydratation, même sans fièvre. C'est une modification fonctionnelle importante du vieillissement neurologique à surveiller particulièrement."
  },
  {
    q: "Concernant les modifications cardiovasculaires du vieillissement, quel paramètre est <u>maintenu</u> au repos ?",
    opts: ["Relaxation du VG","Compliance artérielle","Débit cardiaque de repos","Remplissage diastolique précoce"],
    a: 2,
    corr: "Le <strong>débit cardiaque de repos</strong> est maintenu grâce à une compensation par augmentation de la contraction auriculaire (remplissage tardif ↑). En revanche : relaxation VG ↓, remplissage diastolique précoce altéré, compliance artérielle ↓."
  },
  {
    q: "La <strong>sarcopénie</strong> est définie comme :",
    opts: ["Perte de densité minérale osseuse","Diminution de la masse ET de la force musculaire","Réduction de la capacité aérobie maximale","Atrophie cartilagineuse articulaire"],
    a: 1,
    corr: "<strong>Sarcopénie = ↓ masse musculaire (anatomique) + ↓ force musculaire (fonctionnelle)</strong>. Elle est liée à la réduction des fibres musculaires de type II. Le tandem sarcopénie + ostéopénie → risque élevé de chutes et fractures."
  },
  {
    q: "Quel effet du vieillissement rénal impose d'adapter les posologies médicamenteuses ?",
    opts: ["Augmentation du DFG","Diminution du DFG","Augmentation de la filtration tubulaire","Conservation parfaite de la fonction de concentration"],
    a: 1,
    corr: "<strong>↓ DFG (débit de filtration glomérulaire)</strong> → ↓ élimination rénale → accumulation médicaments. TOUTES les posologies des médicaments à élimination rénale doivent être adaptées à la clairance de créatinine (Cockcroft)."
  },
  {
    q: "L'hypopallesthésie (↓ sensibilité proprioceptive) chez le SA est responsable de :",
    opts: ["Surdité de perception","Instabilité posturale et chutes","Rétention urinaire","Hypertension artérielle systolique isolée"],
    a: 1,
    corr: "<strong>Instabilité posturale → CHUTES</strong>. L'hypopallesthésie résulte de l'↑ du temps de conduction des nerfs périphériques. C'est un FDR majeur de chute chez le sujet âgé, souvent ignoré."
  },
  {
    q: "Quelle modification du cristallin provoque une gêne à la lecture de près ?",
    opts: ["DMLA","Glaucome chronique","Presbytie","Cataracte"],
    a: 2,
    corr: "<strong>Presbytie</strong> = perte d'accommodation du cristallin liée au vieillissement → gêne vision de près. À distinguer de la cataracte (opacification → éblouissement) et du glaucome (HTO → atteinte périphérique)."
  },
  {
    q: "Le vieillissement de l'immunité affecte surtout :",
    opts: ["L'immunité humorale (anticorps)","L'immunité à médiation cellulaire (lymphocytes T)","La production de polynucléaires neutrophiles","Les taux de complément"],
    a: 1,
    corr: "<strong>Immunité à médiation cellulaire (LT) ↓</strong> → ↑ risque infections bactériennes. L'immunité humorale est globalement <strong>préservée</strong>. C'est pourquoi les vaccinations restent efficaces chez le sujet âgé."
  },
  {
    q: "Quelle est la durée d'hospitalisation recommandée pour un 'court séjour gériatrique' ?",
    opts: ["2–4 jours","~10 jours","3 mois renouvelables","Long terme"],
    a: 1,
    corr: "Le <strong>court séjour gériatrique ≈ 10 jours</strong> avec équipe pluridisciplinaire spécialisée. À distinguer : court séjour non gériatrique (4-7j), SSR (3 mois renouvelables), USLD (long terme)."
  },
  {
    q: "La stratégie anti-vieillissement la mieux recommandée parmi les suivantes est :",
    opts: ["Antioxydants (Vit E, C)","Restriction diététique","Activité physique régulière","Correction des déficits hormonaux"],
    a: 2,
    corr: "<strong>Activité physique régulière</strong> est la seule stratégie avec évidence forte : ↓ sarcopénie, ↓ masse grasse, préserve fonctions CV et respiratoires, améliore l'insulinorésistance. Les antioxydants = pas de consensus."
  },
  {
    q: "La constante PaCO2 artérielle chez le sujet âgé est :",
    opts: ["Augmentée (hypercapnie)","Diminuée (hypocapnie)","Inchangée","Variable selon le sexe"],
    a: 2,
    corr: "La <strong>PaCO2 reste inchangée</strong> chez le sujet âgé malgré la baisse de PaO2 (hypoxémie relative). Cela distingue le vieillissement d'une insuffisance respiratoire chronique vraie."
  },
  {
    q: "La triade 'troubles de la marche + dépression + dénutrition' chez le sujet âgé correspond à :",
    opts: ["La triade de Virchow","La triade de décompensation gériatrique","Le syndrome de glissement","La cascade gériatrique initiale"],
    a: 1,
    corr: "<strong>Triade de décompensation gériatrique</strong> : troubles de la marche + dépression + dénutrition → prise en charge précoce indispensable pour éviter la cascade pathologique et la dépendance lourde."
  },
  {
    q: "Au-delà de 70 ans, un patient âgé présente en moyenne combien de pathologies simultanées ?",
    opts: ["3","5","7","10"],
    a: 2,
    corr: "<strong>7 pathologies en moyenne</strong> après 70 ans. Ce chiffre clé ECN illustre la poly-pathologie gériatrique et justifie l'approche multidimensionnelle standardisée (EGS)."
  }
]},

// ═══════════════════════════════════════════════════════════════
{ id: 2,
  title: "Examen Gériatrique & EGS",
  subtitle: "Outils d'évaluation, MMSE, ADL, MNA, GDS",
  questions: [
  {
    q: "L'Évaluation Gériatrique Standardisée (EGS) est définie comme :",
    opts: ["Un bilan biologique systématique","Un bilan multidimensionnel et standardisé des modifications médicales et psychosociales","Un score pronostique de mortalité","Un examen neuropsychologique centré sur la cognition"],
    a: 1,
    corr: "<strong>EGS = bilan multidimensionnel et standardisé</strong> évaluant : nutrition (MNA), autonomie (ADL/IADL), marche (Up & Go), cognition (MMSE), humeur (GDS), sensoriels, polymédication, contexte socio-économique."
  },
  {
    q: "Un score MMSE de 20/30 correspond à quel stade de démence ?",
    opts: ["Pas d'atteinte cognitive","Démence légère","Démence modérée","Démence sévère"],
    a: 2,
    corr: "MMSE : <strong>21–26 = légère | 10–20 = modérée | &lt;10 = sévère</strong>. Le seuil d'altération cognitive est MMSE &lt;24/30 (adapté selon niveau éducatif et âge). À réaliser au minimum 1 fois/an."
  },
  {
    q: "Le Test des 5 mots de Dubois : un rappel libre FAIBLE avec rappel indicé NORMAL suggère :",
    opts: ["Trouble de stockage cortical (Alzheimer)","Trouble d'encodage sous-cortical","Absence de trouble cognitif","Syndrome frontal"],
    a: 1,
    corr: "<strong>Rappel libre ↓ + indicé normal = trouble encodage = sous-cortical</strong>. À l'inverse : rappel libre ↓ + indicé ↓ = trouble stockage cortical = signature Alzheimer. La non-amélioration à l'indiçage est pathognomonique d'Alzheimer."
  },
  {
    q: "Le test Up & Go évalue :",
    opts: ["La mémoire épisodique","La marche et l'équilibre","Les fonctions exécutives","La force du quadriceps uniquement"],
    a: 1,
    corr: "<strong>Test Up & Go = marche + équilibre</strong>. Protocole : se lever d'une chaise → quelques pas → demi-tour → s'asseoir. Seuils : &gt;20s = fragilité posturale ; &lt;12s = normal (Abid : pathologique &gt;18s)."
  },
  {
    q: "Un MNA score de 10/14 implique :",
    opts: ["État nutritionnel normal, pas d'évaluation complémentaire","Suspicion de malnutrition → compléter MNA global","Dénutrition confirmée","Obésité morbide"],
    a: 1,
    corr: "MNA ≤ 11/14 → <strong>suspicion malnutrition → poursuivre évaluation MNA complète</strong>. Score ≥ 12 = normal, pas d'évaluation complémentaire. Score MNA complet &lt;17 = dénutrition confirmée."
  },
  {
    q: "La presbyacousie est une surdité de type :",

// STATE
// ─────────────────────────────────────────────────────────────
const state = {
  scores: {},   // courseId → {correct, total}
  answers: {}   // courseId → {qi: chosen}
};

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function buildCourseNav() {
  const nav = document.getElementById('courseNav');
  COURSES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'course-btn';
    btn.id = `nav-${c.id}`;
    btn.onclick = () => openCourse(c.id);

    const sc = state.scores[c.id];
    const pct = sc ? Math.round((sc.correct/sc.total)*100) : 0;
    const scoreText = sc ? `${sc.correct}/${sc.total} (${pct}%)` : '—';

    btn.innerHTML = `
      <span class="num">Cours ${String(c.id).padStart(2,'0')}</span>
      <div class="title">${c.title}</div>
      <div class="score-badge">${scoreText}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    `;
    nav.appendChild(btn);
  });
}

function updateNav(courseId) {
  const btn = document.getElementById(`nav-${courseId}`);
  if (!btn) return;
  const sc = state.scores[courseId];
  const pct = sc ? Math.round((sc.correct/sc.total)*100) : 0;
  const scoreText = sc ? `${sc.correct}/${sc.total} (${pct}%)` : '—';
  btn.querySelector('.score-badge').textContent = scoreText;
  btn.querySelector('.progress-fill').style.width = pct + '%';
  updateGlobalStats();
}

function updateGlobalStats() {
  let total = 0, correct = 0, done = 0;
  COURSES.forEach(c => {
    const sc = state.scores[c.id];
    if (sc) {
      total += sc.total;
      correct += sc.correct;
      done++;
    }
  });
  document.getElementById('totalCoursesAnswered').textContent = done;
  document.getElementById('globalScore').textContent = total ? `${correct}/${total} (${Math.round(correct/total*100)}%)` : '—';
}

function openCourse(courseId) {
  const course = COURSES.find(c => c.id === courseId);
  if (!course) return;

  document.getElementById('homeView').style.display = 'none';
  document.getElementById('qcmView').style.display = 'block';

  if (!state.answers[courseId]) state.answers[courseId] = {};

  const content = document.getElementById('qcmContent');
  const answered = state.scores[courseId];
  const sc = answered || { correct: 0, total: 0 };

  content.innerHTML = `
    <div class="section-header">
      <div>
        <div class="section-title">${course.title}</div>
        <div class="section-subtitle">${course.subtitle} · ${course.questions.length} questions</div>
      </div>
      <div class="section-score">
        <div class="score-val" id="liveScore">${answered ? `${sc.correct}/${sc.total}` : '—'}</div>
        <div class="score-label">Score</div>
      </div>
    </div>

    <div class="result-banner" id="resultBanner">
      <div>
        <div class="result-text" id="resultText"></div>
        <div class="result-detail" id="resultDetail"></div>
      </div>
      <div class="result-actions">
        <button class="btn btn-ghost" onclick="resetCourse(${courseId})">↺ Recommencer</button>
        <button class="btn btn-primary" onclick="goHome()">← Tous les cours</button>
      </div>
    </div>

    <div id="questionsContainer"></div>
  `;

  const container = document.getElementById('questionsContainer');
  const keys = ['A','B','C','D','E','F'];

  course.questions.forEach((q, qi) => {
    const prevAnswer = state.answers[courseId][qi];
    const isAnswered = prevAnswer !== undefined;

    const card = document.createElement('div');
    card.className = 'question-card' + (isAnswered ? (prevAnswer === q.a ? ' answered correct' : ' answered incorrect') : '');
    card.id = `card-${courseId}-${qi}`;

    const optionsHtml = q.opts.map((opt, oi) => {
      let cls = 'option';
      if (isAnswered) {
        cls += ' disabled';
        if (oi === q.a) cls += ' correct';
        else if (oi === prevAnswer) cls += ' incorrect';
      }
      return `<div class="${cls}" onclick="answer(${courseId},${qi},${oi})">
        <div class="option-key">${keys[oi]}</div>
        <div>${opt}</div>
      </div>`;
    }).join('');

    const corrLabel = isAnswered ? (prevAnswer === q.a ? '<span class="correct-label">✓ Bonne réponse</span>' : '<span class="incorrect-label">✗ Mauvaise réponse</span>') : '';
    const corrBlock = isAnswered ? `<div class="correction show">${corrLabel}${q.corr}</div>` : `<div class="correction" id="corr-${courseId}-${qi}">${q.corr}</div>`;

    card.innerHTML = `
      <div class="q-number">Question ${qi+1} / ${course.questions.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts-${courseId}-${qi}">${optionsHtml}</div>
      ${corrBlock}
    `;
    container.appendChild(card);
  });

  if (answered) showResult(courseId, false);
}

function answer(courseId, qi, chosen) {
  const course = COURSES.find(c => c.id === courseId);
  if (!course) return;
  if (state.answers[courseId][qi] !== undefined) return;

  state.answers[courseId][qi] = chosen;
  const q = course.questions[qi];
  const correct = (chosen === q.a);

  // Update score
  if (!state.scores[courseId]) state.scores[courseId] = { correct: 0, total: 0 };
  state.scores[courseId].total++;
  if (correct) state.scores[courseId].correct++;

  // Update card
  const card = document.getElementById(`card-${courseId}-${qi}`);
  card.className = 'question-card answered ' + (correct ? 'correct' : 'incorrect');

  const optsEl = document.getElementById(`opts-${courseId}-${qi}`);
  const opts = optsEl.querySelectorAll('.option');
  opts.forEach((opt, oi) => {
    opt.classList.add('disabled');
    if (oi === q.a) opt.classList.add('correct');
    else if (oi === chosen) opt.classList.add('incorrect');
  });

  // Show correction
  const corrEl = document.getElementById(`corr-${courseId}-${qi}`);
  const label = correct
    ? '<span class="correct-label">✓ Bonne réponse</span>'
    : '<span class="incorrect-label">✗ Mauvaise réponse</span>';
  corrEl.innerHTML = label + q.corr;
  corrEl.classList.add('show');

  // Live score
  const sc = state.scores[courseId];
  document.getElementById('liveScore').textContent = `${sc.correct}/${sc.total}`;

  updateNav(courseId);

  // Check if all answered
  if (sc.total === course.questions.length) {
    setTimeout(() => showResult(courseId, true), 400);
  }
}

function showResult(courseId, animate) {
  const sc = state.scores[courseId];
  if (!sc) return;
  const pct = Math.round((sc.correct/sc.total)*100);
  const banner = document.getElementById('resultBanner');
  const textEl = document.getElementById('resultText');
  const detailEl = document.getElementById('resultDetail');

  let grade, color;
  if (pct >= 80) { grade = '🏆 Excellent !'; color = '#60c090'; }
  else if (pct >= 60) { grade = '✓ Bien joué'; color = '#f0c060'; }
  else { grade = '📚 À retravailler'; color = '#f06060'; }

  textEl.innerHTML = `<span style="color:${color}">${grade}</span> — ${sc.correct}/${sc.total} questions correctes (${pct}%)`;
  detailEl.textContent = 'Lisez les corrections pour consolider vos connaissances.';
  banner.classList.add('show');

  if (animate) banner.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetCourse(courseId) {
  delete state.scores[courseId];
  delete state.answers[courseId];
  updateNav(courseId);
  openCourse(courseId);
}

function goHome() {
  document.getElementById('qcmView').style.display = 'none';
  document.getElementById('homeView').style.display = 'block';
}

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
buildCourseNav();
updateGlobalStats();
</script>
</body>
